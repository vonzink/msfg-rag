# Retrieval tuning. Consumed by: RetrievalService (acronym query expansion,
# program-aware ranking).
# Editing rules: acronym keys and program keywords are matched lowercase —
# keep them lowercase ASCII. word-patterns are Java regex, single-quoted.
# Every change here must be mirrored in MsfgGoldenPackTest.
acronyms:
  pmi: private mortgage insurance
  mip: mortgage insurance premium
  dti: debt-to-income
  ltv: loan-to-value
  cltv: combined loan-to-value
  piti: principal interest taxes insurance
  arm: adjustable-rate mortgage
  heloc: home equity line of credit
  hoa: homeowners association
  apr: annual percentage rate
  aus: automated underwriting system
  fha: Federal Housing Administration
  va: Veterans Affairs
  usda: United States Department of Agriculture
  # Borrower / broker vocabulary -> guideline vocabulary (Phase 4.7).
  # These translate the words people use into the words the guidelines use,
  # so retrieval finds the right row. Edit live from the dashboard Vocabulary screen.
  duplex: 2-unit two-unit 2-4 units
  triplex: 3-unit three-unit 2-4 units
  fourplex: 4-unit four-unit 2-4 units
  quadplex: 4-unit four-unit 2-4 units
  owner occupied: principal residence
  primary residence: principal residence
  primary: principal residence
  non-owner occupied: investment property
  investment: investment property
  rental: investment property
  vacation home: second home
  rate and term: limited cash-out refinance
  cash out: cash-out refinance
  condo: condominium project
  self employed: self-employment income
  jumbo: non-conforming

programs:
  - program: FHA
    keywords:
      - fha
      - hud
      - "4000.1"
  - program: VA
    keywords:
      - veteran
    word-patterns:
      - '\bva\b'
  - program: USDA
    keywords:
      - usda
      - rural development
  - program: CONVENTIONAL
    keywords:
      - conventional
      - fannie
      - freddie
      - conforming
