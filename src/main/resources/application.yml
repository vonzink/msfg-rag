spring:
  application:
    name: msfg-rag

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/msfg_rag}
    username: ${DB_USERNAME:msfg_rag}
    password: ${DB_PASSWORD:local_dev_only}

  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, never by Hibernate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${DEFAULT_AI_MODEL:claude-3-5-haiku-latest}
          temperature: 0.2
          max-tokens: 1500
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${FALLBACK_AI_MODEL:gpt-4.1-nano}
          temperature: 0.2
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-small}
          dimensions: ${EMBEDDING_DIMENSIONS:1536}

server:
  port: 8080
  max-http-request-header-size: 16KB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# ------------------------------------------------------------
# MSFG application-specific configuration
# ------------------------------------------------------------
msfg:
  rag:
    routing:
      default-provider: ${DEFAULT_AI_PROVIDER:anthropic}
      fallback-provider: ${FALLBACK_AI_PROVIDER:openai}
    retrieval:
      top-k: ${RETRIEVAL_TOP_K:8}
      min-results: 3
      confidence-threshold: ${RETRIEVAL_CONFIDENCE_THRESHOLD:0.55}
      # weights for hybrid score merge (must sum to 1.0)
      vector-weight: 0.65
      keyword-weight: 0.35
    chunking:
      target-tokens: 1000      # within the 700–1200 spec range
      max-tokens: 1200
      overlap-tokens: 150
    storage:
      path: ${DOCUMENT_STORAGE_PATH:./data/documents}
    admin:
      api-key: ${ADMIN_API_KEY:change-me-local-admin-key}
    rate-limit:
      requests-per-minute: 10   # per session/IP on the public ask endpoint

logging:
  level:
    com.msfg.rag: INFO
